# Freedom host allowlist (/etc/hosts format).
#
# An allowlisted domain (and all its subdomains) is visible even when the domain,
# or a parent of it, is on the blocklist (block.conf). The allowlist always wins.
# This is how you see one subdomain of an otherwise blocked domain.
#
# It is ALSO your sovereignty override: a host listed here may be navigated below
# Freedom's TLS standard. If the strict attempt fails, Freedom retries accepting
# TLS 1.2, a classical key exchange, and weak-but-valid certificates -- with a
# warning. The certificate chain is still authenticated (you reach the real site,
# not an impostor). Example: news.ycombinator.com is TLS-1.2-only, so it needs to
# be here to load. Secure by default, but you are sovereign over your own hosts.
#
# Same format and search path as block.conf.

# --- demo: re-enable a single subdomain of the blocked tracker-demo.example ---
# tracker-demo.example is blocked in block.conf, but this line re-enables
# cdn.tracker-demo.example (and, say, x.cdn.tracker-demo.example) only.
cdn.tracker-demo.example
