# Freedom TLS-impersonation opt-in list (/etc/hosts format).
#
# THIRD, most explicit trust signal. A host listed here gets a browser-consistent
# TLS ClientHello: Freedom drops the post-quantum X25519MLKEM768 key-exchange group
# (almost no shipping Firefox of our advertised version offers it, so offering it
# under our Firefox User-Agent is the single loudest "this isn't a real browser"
# tell at the TLS layer) and orders the TLS 1.2/1.3 ciphersuites like the browser we
# present. This makes the JA3/JA4 fingerprint stop contradicting the User-Agent, so
# anti-bot systems (Cloudflare/Akamai/Google) that correlate the two are less likely
# to flag the connection.
#
# It is gated THREE times (fail-closed): a host is TLS-impersonated only when it is
# on ALL of allow.conf AND js.conf AND this file. The first two are the existing
# double trust (sovereign allowlist + JS enabled); this file is the explicit "yes,
# disguise my TLS for THIS host" opt-in. Anything not on all three uses Freedom's
# default hardened PQ-hybrid ClientHello.
#
# TRADE-OFF you are signing per host: dropping MLKEM means this host's traffic uses
# a CLASSICAL key exchange -- so it loses post-quantum "Harvest-Now, Decrypt-Later"
# protection on THIS route only. Authenticity is untouched (the certificate chain is
# still fully verified); only the key-exchange strength relaxes. The rest of your
# browsing keeps the PQ-hybrid handshake. See spec/tls_impersonate.md.
#
# NOTE: this is the interim OpenSSL blend. It gets the JA3 close to the browser (the
# cipher list matches), but not byte-exact -- OpenSSL cannot reproduce a browser's
# exact extension ordering / GREASE. Byte-exact JA3 is the future BoringSSL helper.
# It does NOT defeat reCAPTCHA/BotGuard/IP-reputation walls, which are not TLS.
#
# Same format and search path as allow.conf ($FREEDOM_HOSTS_DIR, ~/.config/freedom,
# ./config). One domain per line (covers subdomains); leading "0.0.0.0 " is ignored.

# --- triple-opt-in hosts (must be in allow.conf AND js.conf too) ---
google.com
youtube.com
facebook.com
instagram.com
reddit.com
x.com
github.com
linkedin.com
stackoverflow.com
stackexchange.com
medium.com
twitch.tv
jkanime.net
