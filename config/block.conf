# Freedom host blocklist (/etc/hosts format).
#
# One domain per line, or "0.0.0.0 domain" hosts-style lines (the IP is ignored).
# A blocked domain also blocks every subdomain. Comments start with '#'.
# The allowlist (allow.conf) wins over this list and can re-enable a subdomain.
#
# Lists are read, in order, from $FREEDOM_HOSTS_DIR, ~/.config/freedom, and ./config
# (this file). Each that exists is loaded; absent files are fine (nothing blocked).

# --- common trackers / ad networks (illustrative, not exhaustive) ---
0.0.0.0 doubleclick.net
0.0.0.0 google-analytics.com
0.0.0.0 googletagmanager.com
0.0.0.0 googlesyndication.com
0.0.0.0 scorecardresearch.com
0.0.0.0 adservice.google.com
0.0.0.0 facebook.net
0.0.0.0 connect.facebook.net

# --- demo: this whole domain is blocked, including its subdomains ---
# Try loading https://tracker-demo.example -> blocked.
# Then see allow.conf, which re-enables cdn.tracker-demo.example only.
tracker-demo.example
