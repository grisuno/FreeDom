<!DOCTYPE html>
<html>
<body>
<div id="d1">Div 1</div>
<div id="d2">Div 2</div>
<script>
var body = document.getElementById('d1').parentNode;
console.log('BEFORE: children count:', body.childNodes.length);
console.log('  children:', body.children.length);

var f1 = document.createElement('form');
f1.id = 'f1';
body.appendChild(f1);
console.log('AFTER append form1: children:', body.children.length);

var f2 = document.createElement('form');
f2.id = 'f2';
body.appendChild(f2);
console.log('AFTER append form2: children:', body.children.length);

body.removeChild(f1);
console.log('AFTER remove form1: children:', body.children.length);

body.removeChild(f2);
console.log('AFTER remove form2: children:', body.children.length);

// Final state
var children = body.children;
for (var i = 0; i < children.length; i++) {
  console.log('  child ' + i + ': ' + children[i].tagName + ' id=' + children[i].id);
}
</script>
</body>
</html>
