name: FreeDom Continuous Integration

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  schedule:
    # Trigger para fuzzing nocturno profundo (Todos los días a las 02:00 UTC)
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  # 1. JOB DE COMPILACIÓN NATIVA Y PRUEBAS UNITARIAS
  native-build-and-test:
    name: Native Build & Unit Tests (CMocka)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: System Dependencies Resolution
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libcairo2-dev \
            libcmocka-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libjpeg-dev \
            libpng-dev \
            libssl-dev \
            libswscale-dev \
            libwayland-bin \
            libwayland-dev \
            libwebp-dev \
            libxkbcommon-dev \
            pkg-config \
            wayland-protocols \
            fontconfig

          # Compatibilidad: wl_display_set_max_buffer_size se agregó en wayland 1.22;
          # si el header no lo declara (runner antiguo), lo añadimos aquí.
          # La función existe en libwayland-client.so, solo falta el prototipo.
          if ! grep -q 'wl_display_set_max_buffer_size' /usr/include/wayland-client-core.h 2>/dev/null; then
            echo "[*] Adding wl_display_set_max_buffer_size compat declaration"
            printf '\nvoid\nwl_display_set_max_buffer_size(struct wl_display *display, size_t max_buffer_size);\n' \
              | sudo tee -a /usr/include/wayland-client-core.h >/dev/null
          fi

      - name: Build Lexbor from source
        run: |
          git clone --depth 1 https://github.com/lexbor/lexbor.git /tmp/lexbor
          cmake -S /tmp/lexbor -B /tmp/lexbor -DLEXBOR_BUILD_SEPARATELY=OFF
          make -C /tmp/lexbor -j$(nproc)
          sudo make -C /tmp/lexbor install
          sudo ldconfig
          rm -rf /tmp/lexbor

      - name: Compile FreeDom Binaries
        run: |
          # Stub para wl_display_set_max_buffer_size si la lib del runner no lo tiene
          STUB=""
          if ! nm -D /usr/lib/x86_64-linux-gnu/libwayland-client.so 2>/dev/null | grep -q 'wl_display_set_max_buffer_size'; then
            echo "[*] wl_display_set_max_buffer_size missing from libwayland, building stub"
            printf '#include <stddef.h>\n#include <wayland-client-core.h>\nvoid wl_display_set_max_buffer_size(struct wl_display *d, size_t s) { (void)d; (void)s; }\n' > /tmp/wl_stub.c
            cc -c /tmp/wl_stub.c -o /tmp/wl_stub.o
            STUB="/tmp/wl_stub.o"
          fi

          make clean && make all LDFLAGS="-pie -Wl,-z,relro,-z,now,-z,noexecstack ${STUB}"

      - name: Execute Test Suite
        run: make test

  # 2. JOB DE DETERMINISMO Y CONTENEDORIZACIÓN (DOCKER)
  docker-security-build:
    name: Containerize & Sandbox Verification
    runs-on: ubuntu-24.04
    needs: native-build-and-test
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Hardened Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: freedom-browser:latest
          outputs: type=docker,dest=/tmp/freedom-browser.tar

      - name: Validate Container Isolation (Smoke Test)
        run: |
          docker load --input /tmp/freedom-browser.tar
          # Verificar que levante correctamente bajo restricciones severas
          docker run -d \
            --name freedom-ci-validation \
            --cap-drop=ALL \
            --security-opt no-new-privileges:true \
            --memory="1g" \
            freedom-browser:latest
          
          sleep 5
          
          # Verificar estado y asegurar que no haya crasheado el entrypoint
          if [ "$(docker inspect -f '{{.State.Running}}' freedom-ci-validation)" != "true" ]; then
            echo "::error::[!] FreeDom Docker container failed to maintain a stable runtime execution."
            docker logs freedom-ci-validation
            exit 1
          fi
          docker rm -f freedom-ci-validation

  # 3. JOB DE CONTINUOUS FUZZING (AFL++)
  continuous-fuzzing:
    name: Automated Fuzz Testing (AFL++)
    runs-on: ubuntu-24.04
    needs: native-build-and-test
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install AFL++ and Build Stack
        run: |
          sudo apt-get update
          sudo apt-get install -y afl++ build-essential cmake libssl-dev libcurl4-openssl-dev libcmocka-dev

      - name: Instrument Build using AFL Wrappers
        run: |
          export CC=afl-clang-fast
          export CXX=afl-clang-fast++
          ./configure

      - name: Compile Fuzz Harnesses
        run: |
          export CC=afl-clang-fast
          # Compilar la suite dentro de tu directorio de fuzzing
          make -C fuzz/

      - name: Execute Mutation Fuzzing (Time-Boxed Window)
        run: |
          export AFL_I_DONT_CARE_ABOUT_THE_SYSTEM_SIZE=1
          export AFL_SKIP_CPUFREQ=1
          
          # Crear directorios de semillas mínimos si no existen en el repo
          mkdir -p fuzz/in
          echo "<html><body><p>FreeDom Test Seed</p></body></html>" > fuzz/in/seed.html
          
          echo "[*] Launching AFL++ instrumentation engine..."
          # Ventana de fuzzing corta en commits normales (10 min), se puede extender en el cron
          timeout 10m afl-fuzz -i fuzz/in -o fuzz/out -- ./fuzz/harness_target @@ || true

      - name: Analyze Vulnerabilities & Memory Crashes
        id: check-crashes
        run: |
          if [ -d "fuzz/out/default/crashes" ] && [ "$(ls -A fuzz/out/default/crashes)" ]; then
            echo "::error::[!] Memory corruption or critical crashes detected by AFL++ in FreeDom core!"
            ls -la fuzz/out/default/crashes/
            exit 1
          else
            echo "[+] No stability issues found during the automated fuzzing session."
          fi

      - name: Persist Crash Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: freedom-fuzz-crashes
          path: fuzz/out/default/crashes/
          retention-days: 5
