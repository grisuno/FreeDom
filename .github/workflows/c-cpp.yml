name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el repositorio
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Instalar dependencias del sistema
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          libcairo2-dev \
          libwayland-dev \
          wayland-protocols \
          libxkbcommon-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          fontconfig \
          libfreetype6-dev

    # 3. Descargar, compilar e instalar Lexbor globalmente
    - name: Install Lexbor from source
      run: |
        git clone https://github.com/lexbor/lexbor.git
        cd lexbor
        cmake -DLEXBOR_BUILD_SEPARATELY=OFF .
        make
        sudo make install
        sudo ldconfig

    # 4. Limpiar antes de compilar
    - name: make clean
      run: make clean

    # 5. Compilar forzando compatibilidad de OpenSSL sin alterar tus CFLAGS internos
    - name: make all
      run: |
        # Usamos variables del compilador para meter los flags de OpenSSL sin pisar tu Makefile
        export CPATH="/usr/local/include:$CPATH"
        export LIBRARY_PATH="/usr/local/lib:$LIBRARY_PATH"
        export LD_LIBRARY_PATH="/usr/local/lib:$LD_LIBRARY_PATH"
        
        # Este flag obliga a OpenSSL a exponer TODAS las funciones de la versión 3.0 en adelante
        export C_INCLUDE_PATH="/usr/local/include:$C_INCLUDE_PATH"
        
        # Pasamos el flag de compatibilidad directo a través de una variable que interactúa con GCC de fondo
        make all EXTRA_CFLAGS="-DOPENSSL_API_COMPAT=0x30000000L" APP_CFLAGS="-DOPENSSL_API_COMPAT=0x30000000L" DEF="-DOPENSSL_API_COMPAT=0x30000000L"
