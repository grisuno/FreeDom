name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el repositorio y sus submódulos de forma recursiva
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Instalar dependencias del sistema requeridas por FreeDom
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          libcairo2-dev \
          libwayland-dev \
          wayland-protocols \
          libxkbcommon-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          fontconfig \
          libfreetype6-dev

    # 3. Descargar, compilar e instalar Lexbor globalmente
    - name: Install Lexbor from source
      run: |
        git clone https://github.com/lexbor/lexbor.git
        cd lexbor
        cmake -DLEXBOR_BUILD_SEPARATELY=OFF .
        make
        sudo make install
        sudo ldconfig

    # 4. Compilar el proyecto inyectando _GNU_SOURCE para OpenSSL
    - name: make all
      env:
        CPPFLAGS: "-D_GNU_SOURCE"
        CFLAGS: "-D_GNU_SOURCE"
      run: make all

    # 5. Limpieza (Opcional, pero incluido en tu flujo original)
    - name: make clean
      run: make clean

    # 6. Ejecutar la suite de tests de FreeDom
    - name: make test
      run: make test
