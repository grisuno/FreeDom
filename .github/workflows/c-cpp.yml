name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el repositorio asegurando que baje todos los submódulos (si Lexbor lo es)
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Instalar solo las dependencias reales del sistema (Wayland, Cairo, etc.)
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcairo2-dev \
          libwayland-dev \
          wayland-protocols \
          libxkbcommon-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          fontconfig \
          libfreetype6-dev

    # 3. Si Lexbor es una carpeta de código dentro de third_party que requiere compilarse 
    # antes de tu 'make all', solemos necesitar compilarla primero. 
    # Si tu Makefile principal ya se encarga de compilar third_party, este paso se puede omitir.
    # Por si acaso, intentamos compilar Lexbor si tiene su propio Makefile/CMake:
    - name: Build vendored dependencies (Lexbor)
      run: |
        if [ -d "third_party/lexbor" ]; then
          echo "Lexbor detectado en third_party. Verificando compilación..."
          # Si tu proyecto requiere instalar lexbor en el sistema desde third_party:
          # cd third_party/lexbor && cmake . && make && sudo make install
        fi

    - name: make
      run: make all

    - name: make clean
      run: make clean

    - name: make test
      run: make test
