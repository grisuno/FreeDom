name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el repositorio
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Instalar dependencias del sistema
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          libcairo2-dev \
          libwayland-dev \
          wayland-protocols \
          libxkbcommon-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          fontconfig \
          libfreetype6-dev

    # 3. Descargar, compilar e instalar Lexbor globalmente
    - name: Install Lexbor from source
      run: |
        git clone https://github.com/lexbor/lexbor.git
        cd lexbor
        cmake -DLEXBOR_BUILD_SEPARATELY=OFF .
        make
        sudo make install
        sudo ldconfig

    # 4. Limpiar antes de compilar
    - name: make clean
      run: make clean

    # 5. Compilar usando CPATH para Lexbor y agregando _GNU_SOURCE solo si no existe
    - name: make all
      run: |
        # Añadimos _GNU_SOURCE directamente en secure_fetch.c antes de compilar para no romper los demás archivos
        sed -i '1s/^/#define _GNU_SOURCE\n/' src/secure_fetch.c
        
        # Ejecutamos el make limpio pasándole la ruta de /usr/local a través de CPATH
        export CPATH="/usr/local/include:$CPATH"
        export LIBRARY_PATH="/usr/local/lib:$LIBRARY_PATH"
        export LD_LIBRARY_PATH="/usr/local/lib:$LD_LIBRARY_PATH"
        
        make all

    # 6. Ejecutar las pruebas
    - name: make test
      run: make test
