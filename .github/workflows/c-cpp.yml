name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el repositorio
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Instalar dependencias del sistema
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          libcairo2-dev \
          libwayland-dev \
          wayland-protocols \
          libxkbcommon-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          fontconfig \
          libfreetype6-dev

    # 3. Descargar, compilar e instalar Lexbor globalmente
    - name: Install Lexbor from source
      run: |
        git clone https://github.com/lexbor/lexbor.git
        cd lexbor
        cmake -DLEXBOR_BUILD_SEPARATELY=OFF .
        make
        sudo make install
        sudo ldconfig

    # 4. Limpiar antes de compilar
    - name: make clean
      run: make clean

    # 5. Compilar inyectando la macro de compatibilidad directo en el archivo conflictivo
    - name: make all
      run: |
        # Inyectamos de forma agresiva los flags necesarios al inicio de secure_fetch.c
        # Esto expone SSL_get0_group_name en OpenSSL 3.0+ sin afectar a tab.c
        sed -i '1s/^/#define _GNU_SOURCE\n#define OPENSSL_API_COMPAT 0x30000000L\n/' src/secure_fetch.c
        
        # Configuramos CPATH para que las cabeceras de Lexbor se encuentren sin tocar CFLAGS
        export CPATH="/usr/local/include:$CPATH"
        export LIBRARY_PATH="/usr/local/lib:$LIBRARY_PATH"
        export LD_LIBRARY_PATH="/usr/local/lib:$LD_LIBRARY_PATH"
        
        make all

    # 6. Ejecutar las pruebas
    - name: make test
      run: make test
