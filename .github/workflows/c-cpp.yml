name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el repositorio
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Instalar dependencias del sistema
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          libcairo2-dev \
          libwayland-dev \
          wayland-protocols \
          libxkbcommon-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          fontconfig \
          libfreetype6-dev

    # 3. Descargar, compilar e instalar Lexbor globalmente
    - name: Install Lexbor from source
      run: |
        git clone https://github.com/lexbor/lexbor.git
        cd lexbor
        cmake -DLEXBOR_BUILD_SEPARATELY=OFF .
        make
        sudo make install
        sudo ldconfig

    # 4. Limpiar el directorio de build primero
    - name: make clean
      run: make clean

    # 5. Compilar el proyecto heredando las rutas correctas
    - name: make all
      run: make all EXTRA_CFLAGS="-D_GNU_SOURCE -I/usr/local/include" CFLAGS="-std=c11 -Wall -Wextra -Werror -Wshadow -Wpointer-arith -Wvla -Wwrite-strings -fstack-protector-strong -fstack-clash-protection -fcf-protection=full -D_FORTIFY_SOURCE=3 -fPIE -O2 -Iinclude -I/usr/local/include -D_GNU_SOURCE"

    # 6. Ejecutar las pruebas
    - name: make test
      run: make test
