name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          libcairo2-dev \
          libwayland-dev \
          wayland-protocols \
          libxkbcommon-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          fontconfig \
          libfreetype6-dev

    # clonamos, compilamos e instalamos lexbor globalmente en el contenedor de CI
    - name: Install Lexbor from source
      run: |
        git clone https://github.com/lexbor/lexbor.git
        cd lexbor
        cmake -DLEXBOR_BUILD_SEPARATELY=OFF .
        make
        sudo make install
        # Actualizamos la caché de librerías del sistema para que reconozca el nuevo .so
        sudo ldconfig

    - name: make all
      run: make all

    - name: make clean
      run: make clean

    - name: make test
      run: make test
