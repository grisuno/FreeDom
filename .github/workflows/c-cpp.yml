name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    # 1. Clonar el repositorio
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Instalar dependencias del sistema
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          git \
          libcairo2-dev \
          libcmocka-dev \
          libcurl4-openssl-dev \
          libfreetype6-dev \
          libharfbuzz-dev \
          libavcodec-dev \
          libavformat-dev \
          libavutil-dev \
          libjpeg-dev \
          libpng-dev \
          libssl-dev \
          libswscale-dev \
          libwayland-bin \
          libwayland-dev \
          libwebp-dev \
          libxkbcommon-dev \
          pkg-config \
          wayland-protocols \
          fontconfig

        # Compatibilidad: si libwayland no tiene wl_display_set_max_buffer_size
        # (wayland < 1.22), agregamos un macro al header que hace la llamada no-op
        # para que compile y linkee sin el símbolo ausente.
        if ! nm -D /usr/lib/x86_64-linux-gnu/libwayland-client.so 2>/dev/null | grep -q 'wl_display_set_max_buffer_size'; then
          echo "[*] wl_display_set_max_buffer_size missing, adding no-op macro to wayland-client.h"
          printf '#define wl_display_set_max_buffer_size(d,s) ((void)(d),(void)(s))\n' \
            | sudo tee -a /usr/include/wayland-client.h >/dev/null
        fi

        # Compatibilidad: cmocka < 2.5.8 usa va_list sin incluir <stdarg.h>,
        # lo que falla bajo -std=c11.
        if grep -q 'va_list' /usr/include/cmocka.h 2>/dev/null && ! grep -q '#include <stdarg.h>' /usr/include/cmocka.h 2>/dev/null; then
          echo "[*] cmocka.h missing <stdarg.h> include, adding it"
          sudo sed -i '1s/^/#include <stdarg.h>\n/' /usr/include/cmocka.h
        fi

    # 3. Descargar, compilar e instalar Lexbor globalmente
    - name: Install Lexbor from source
      run: |
        git clone https://github.com/lexbor/lexbor.git
        cd lexbor
        cmake -DLEXBOR_BUILD_SEPARATELY=OFF .
        make
        sudo make install
        sudo ldconfig

    # 4. Limpiar antes de compilar
    - name: make clean
      run: make clean

    - name: make all
      run: |
        # Parche: Asegurar cabeceras OpenSSL y definir macros de Argon2 si faltan en versiones < 3.3
        sed -i '1s/^/#include <openssl\/kdf.h>\n#ifndef OSSL_KDF_PARAM_ARGON2_LANES\n#define OSSL_KDF_PARAM_ARGON2_LANES "lanes"\n#endif\n#ifndef OSSL_KDF_PARAM_ARGON2_MEMCOST\n#define OSSL_KDF_PARAM_ARGON2_MEMCOST "memcost"\n#endif\n#ifndef OSSL_KDF_PARAM_THREADS\n#define OSSL_KDF_PARAM_THREADS "threads"\n#endif\n#define _GNU_SOURCE\n/' src/local_store.c

        # Exportamos rutas de librerías para Lexbor (NO exportar CFLAGS:
        # eso previene que el Makefile asigne CFLAGS ?= con -Iinclude y demás flags).
        export CPATH="/usr/local/include:$CPATH"
        export LIBRARY_PATH="/usr/local/lib:$LIBRARY_PATH"
        export LD_LIBRARY_PATH="/usr/local/lib:$LD_LIBRARY_PATH"

        make all
    # 6. Ejecutar las pruebas unitarias e integración
    - name: make test
      run: |
        export CPATH="/usr/local/include:$CPATH"
        export LIBRARY_PATH="/usr/local/lib:$LIBRARY_PATH"
        export LD_LIBRARY_PATH="/usr/local/lib:$LD_LIBRARY_PATH"
        make test
